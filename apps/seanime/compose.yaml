services:
  seanime:
    image: umagistr/seanime
    container_name: seanime
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    expose:
      - 43211
    environment:
      HOME: "/home/seanime"
      SEANIME_SERVER_PORT: 43211
      SEANIME_SERVER_HOST: "0.0.0.0"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seanime.rule=Host(`${SEANIME_HOSTNAME?}`)"
      - "traefik.http.routers.seanime.entrypoints=websecure"
      - "traefik.http.routers.seanime.tls.certresolver=letsencrypt"
      - "traefik.http.routers.seanime.middlewares=authelia@docker"
      - "traefik.http.services.seanime.loadbalancer.server.port=43211"
    volumes:
      - /mnt/user/anime:/anime
      - /mnt/user/downloads:/downloads
      - /mnt:/mnt:rslave
      - ./config.toml:/home/seanime/.config/Seanime/config.toml
      - ${DOCKER_DATA_DIR}/seanime:/home/seanime/.config/Seanime

    healthcheck:
      test: wget -qO- http://localhost:43211/api/v1/status
      interval: 5m
      timeout: 10s
      retries: 5
      start_period: 10s
    profiles:
      - seanime
      - all
